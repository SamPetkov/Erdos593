name: Manuscript artifact synchronization

on:
  pull_request:
    branches: [main]
    paths:
      - 'erdos593_obligatory_triple_systems.tex'
      - 'erdos593_obligatory_triple_systems.md'
      - 'erdos593_obligatory_triple_systems.pdf'
      - 'Erdos593_revised.tex'
      - 'arxiv/**'
      - 'README.md'
      - 'CITATION.cff'
      - 'MANIFEST.txt'
      - 'SHA256SUMS'
      - 'scripts/sync_manuscript_artifacts.py'
      - '.github/workflows/manuscript-artifacts.yml'
  push:
    branches: [main]
    paths:
      - 'erdos593_obligatory_triple_systems.tex'
      - 'erdos593_obligatory_triple_systems.md'
      - 'erdos593_obligatory_triple_systems.pdf'
      - 'Erdos593_revised.tex'
      - 'arxiv/**'
      - 'README.md'
      - 'CITATION.cff'
      - 'MANIFEST.txt'
      - 'SHA256SUMS'
      - 'scripts/sync_manuscript_artifacts.py'
      - '.github/workflows/manuscript-artifacts.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synchronize-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - name: Install TeX, Pandoc, and PDF verification tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            latexmk \
            pandoc \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-science \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            poppler-utils
      - name: Synchronize generated artifacts
        run: python scripts/sync_manuscript_artifacts.py
      - name: Commit synchronized artifacts on same-repository PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          if git diff --quiet --exit-code -- .; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize Erdős 593 manuscript artifacts'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Require committed synchronization
        run: git diff --exit-code -- .
      - name: Verify PDF typography and mirrors
        run: |
          set -euo pipefail
          pdf=erdos593_obligatory_triple_systems.pdf
          pdfinfo "$pdf" > /tmp/erdos593-pdfinfo.txt
          pdftotext "$pdf" /tmp/erdos593-text.txt
          pdffonts "$pdf" > /tmp/erdos593-fonts.txt
          grep -Fq 'A4' /tmp/erdos593-pdfinfo.txt
          grep -Fq 'Obligatory Triple Systems: An Alternative Proof' /tmp/erdos593-text.txt
          grep -Fq 'Samuil Petkov' /tmp/erdos593-text.txt
          grep -Fq 'Eric Li' /tmp/erdos593-text.txt
          ! grep -Eq 'Samuil Pekov|Samuil Petkob|Samuil Petkov (&|and) ChatGPT' /tmp/erdos593-text.txt
          ! grep -Eq '[[:space:]]no[[:space:]]' /tmp/erdos593-fonts.txt
          cmp -s "$pdf" arxiv/main.pdf
          cmp -s erdos593_obligatory_triple_systems.tex arxiv/main.tex
          cmp -s erdos593_obligatory_triple_systems.tex Erdos593_revised.tex
          cmp -s erdos593_obligatory_triple_systems.md arxiv/main.md
