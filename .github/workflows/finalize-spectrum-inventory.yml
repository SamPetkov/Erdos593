name: Finalize clean finite parameter inventory

on:
  push:
    branches: [agent/finite-parameter-spectrum]
    paths:
      - '.github/workflows/finalize-spectrum-inventory.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finite-parameter-spectrum
          fetch-depth: 0
      - name: Install manuscript toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            latexmk \
            pandoc \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-science \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            poppler-utils
      - name: Stage removal before inventory generation
        run: git rm .github/workflows/finalize-spectrum-inventory.yml
      - name: Regenerate clean artifacts and inventory
        run: python -u scripts/sync_manuscript_artifacts.py
      - name: Verify clean inventory and corrected proof
        run: |
          set -euo pipefail
          ! grep -Fq 'finalize-spectrum-inventory.yml' MANIFEST.txt
          ! grep -Fq 'finalize-spectrum-inventory.yml' SHA256SUMS
          ! grep -Fq 'resync-spectrum-after-correction.yml' MANIFEST.txt
          ! grep -Fq 'resync-spectrum-after-correction.yml' SHA256SUMS
          grep -Fq '$(a-1)(b-1)\ge0$' erdos593_obligatory_triple_systems.tex
          cmp -s erdos593_obligatory_triple_systems.tex arxiv/main.tex
          cmp -s erdos593_obligatory_triple_systems.pdf arxiv/main.pdf
          pdfinfo erdos593_obligatory_triple_systems.pdf | grep -Fq 'Pages:           18'
      - name: Commit final clean inventory
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize clean finite parameter inventory'
          git push origin HEAD:agent/finite-parameter-spectrum
