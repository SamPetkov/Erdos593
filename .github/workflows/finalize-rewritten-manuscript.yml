name: Finalize rewritten manuscript

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.issue.title == 'Finalize clean Problem 593 manuscript'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/sync-final-manuscript-20260720

      - name: Restore verified manuscript
        run: |
          set -euo pipefail
          git fetch origin agent/revise-erdos593-manuscript
          : > /tmp/manuscript.tar.gz
          while IFS= read -r file; do
            git show "FETCH_HEAD:${file}" >> /tmp/manuscript.tar.gz
          done < <(git ls-tree -r --name-only FETCH_HEAD .sync_payload | sort)
          echo 'a0203c5b69e5c80d7255efa601950f4c1bcea2f303b6d4aef108b9b7c7065d06  /tmp/manuscript.tar.gz' | sha256sum -c --strict
          tar -xzf /tmp/manuscript.tar.gz -C .

      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        env:
          TZ: UTC
          SOURCE_DATE_EPOCH: 1783771200
          FORCE_SOURCE_DATE: 1
        with:
          root_file: erdos593_obligatory_triple_systems.tex

      - name: Verify and commit final files
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          base=erdos593_obligatory_triple_systems

          grep -Fq '\usepackage[numbers,sort&compress]{natbib}' "$base.tex"
          ! grep -Eq '\\address|\\email|École|Ecole|samuil\.petkov' "$base.tex" "$base.md"
          grep -Fq 'The author thanks Tom de Groot for his advice on how to revise the manuscript for greater clarity.' "$base.md"
          pdftotext "$base.pdf" - | grep -Fq '[1]'
          ! pdftotext "$base.pdf" - | grep -Eq 'École|Ecole|samuil\.petkov|Email address'
          test "$(pdfinfo "$base.pdf" | awk '/^Pages:/ {print $2}')" = 16
          pdfinfo "$base.pdf" | grep -Fq 'A4'
          if grep -E 'LaTeX Warning|Package .* Warning|Overfull \\hbox|Underfull \\hbox|Overfull \\vbox|Underfull \\vbox|undefined references|Citation.*undefined' "$base.log"; then exit 1; fi

          mkdir -p arxiv
          cp "$base.tex" arxiv/main.tex
          cp "$base.md" arxiv/main.md
          cp "$base.pdf" arxiv/main.pdf
          cp "$base.tex" Erdos593_revised.tex

          cat > build.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          BASE=erdos593_obligatory_triple_systems
          BUILD_DIR="$(mktemp -d "${TMPDIR:-/tmp}/erdos593.XXXXXX")"
          trap 'rm -rf "$BUILD_DIR"' EXIT
          cp "$ROOT/$BASE.tex" "$BUILD_DIR/"
          cd "$BUILD_DIR"
          export TZ=UTC SOURCE_DATE_EPOCH=1783771200 FORCE_SOURCE_DATE=1
          latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error "$BASE.tex"
          cp "$BASE.pdf" "$ROOT/$BASE.pdf"
          SH
          chmod +x build.sh

          sed -i 's/reproducible LuaLaTeX\/Biber build/reproducible pdfLaTeX\/latexmk build/' README.md || true
          sed -i 's/A TeX Live installation containing LuaLaTeX, Biber, `amsart`, `newtx`, `biblatex`, `microtype`, and the AMS packages is required./A TeX Live installation containing pdfLaTeX, `latexmk`, `amsart`, `newtx`, `natbib`, `microtype`, and the AMS packages is required./' README.md || true
          if ! grep -Fq '## Final synchronized manuscript' README.md; then
            cat >> README.md <<'MD'

          ## Final synchronized manuscript

          The principal LaTeX, PDF, and Markdown files are synchronized with the rewritten arXiv manuscript. Citations are numeric and the bibliography is numbered. The visible author affiliation and email are intentionally omitted. The acknowledgment thanks Tom de Groot for his advice on how to revise the manuscript for greater clarity.
          MD
          fi

          rm -rf .sync_payload
          rm -f .github/workflows/finalize-rewritten-manuscript.yml
          rm -f .github/workflows/sync-rewritten-manuscript.yml .github/workflows/sync-rewritten-manuscript-v2.yml .github/workflows/sync-rewritten-manuscript-final.yml
          rm -f "$base".{aux,log,out,fls,fdb_latexmk}

          if [ -f MANIFEST.txt ]; then
            tmp="$(mktemp)"
            while IFS= read -r file; do [ "$file" = SHA256SUMS ] || sha256sum "$file"; done < MANIFEST.txt > "$tmp"
            mv "$tmp" SHA256SUMS
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize final Problem 593 manuscript'
          git push origin HEAD:agent/sync-final-manuscript-20260720
