name: Apply finite consequences revision

on:
  push:
    branches:
      - agent/finite-consequences-v1-baseline
    paths:
      - '.github/workflows/apply-finite-consequences.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-finite-consequences.yml'
      - 'tmp/finite_consequences_payload.b64'

permissions:
  contents: write

jobs:
  apply-build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finite-consequences-v1-baseline
          fetch-depth: 0

      - name: Install manuscript dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            latexmk \
            pandoc \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-science \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            poppler-utils

      - name: Apply source revision
        shell: bash
        run: |
          python3 - <<'PYCODE'
          import base64
          import gzip
          from pathlib import Path

          payload = Path('tmp/finite_consequences_payload.b64').read_text(encoding='utf-8')
          code = gzip.decompress(base64.b64decode(payload)).decode('utf-8')
          exec(compile(code, 'apply_finite_consequences.py', 'exec'), {'__name__': '__main__'})
          PYCODE

      - name: Remove one-shot files and synchronize artifacts
        run: |
          set -euo pipefail
          git rm .github/workflows/apply-finite-consequences.yml tmp/finite_consequences_payload.b64
          python -u scripts/sync_manuscript_artifacts.py

      - name: Validate revision
        run: |
          set -euo pipefail
          grep -Fq '\section{Finite structure beyond the classification}' erdos593_obligatory_triple_systems.tex
          grep -Fq 'The author thanks Tom de Groot for his advice on revising the manuscript for' erdos593_obligatory_triple_systems.tex
          grep -Fq "Eric Li's v1 preprint" erdos593_obligatory_triple_systems.tex
          grep -Fq 'Exact order--size--component spectrum' erdos593_obligatory_triple_systems.tex
          git diff --check
          pdfinfo erdos593_obligatory_triple_systems.pdf | grep -Fq 'A4'
          pdftotext erdos593_obligatory_triple_systems.pdf - | grep -Fq 'Finite structure beyond the classification'

      - name: Commit synchronized revision
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add finite consequences and consolidate attribution'
          git push origin HEAD:agent/finite-consequences-v1-baseline
