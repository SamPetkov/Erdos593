name: Synchronize rewritten manuscript

on:
  push:
    branches:
      - agent/revise-erdos593-manuscript

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore the verified manuscript source
        env:
          GH_TOKEN: ${{ github.token }}
          PAYLOAD_SHA256: a0203c5b69e5c80d7255efa601950f4c1bcea2f303b6d4aef108b9b7c7065d06
        run: |
          set -euo pipefail
          : > /tmp/erdos593-manuscript.tar.gz
          for sha in \
            beefd1f8d89c04ccf5e9b3b2279c81bfd1da05e4 \
            e70d95d19ae40a177dbc73aa65a7d131c6a4bd3f \
            e2d2e0e658613ec55ca6ecfcc2bbd0ceb6394f52 \
            0926016060ecd8a47204bb29879e85147786410c \
            76149fcf7410057889e7128c85b6b345c1324eb7 \
            43d4b97620eb2d9f7a90eafda246713873968a1b \
            80a26be19d6ea19b59b0d5efa61096f644a3ec7c \
            33c2acfd8ed5ffe3b1b22aaf5214a6a8a692e397 \
            a512ad81a39e3cca2624f327e9d7daeb180c6143 \
            e9a510b53585502686457389204f7fb6ca5f78e0
          do
            curl --fail --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" \
            | python3 -c 'import base64,json,sys; data=json.load(sys.stdin); sys.stdout.buffer.write(base64.b64decode(data["content"]))' \
            >> /tmp/erdos593-manuscript.tar.gz
          done
          echo "${PAYLOAD_SHA256}  /tmp/erdos593-manuscript.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/erdos593-manuscript.tar.gz -C .

      - name: Compile the canonical PDF
        uses: xu-cheng/latex-action@v3
        env:
          TZ: UTC
          SOURCE_DATE_EPOCH: 1783771200
          FORCE_SOURCE_DATE: 1
        with:
          root_file: erdos593_obligatory_triple_systems.tex

      - name: Verify and finalize the repository package
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils

          tex=erdos593_obligatory_triple_systems.tex
          pdf=erdos593_obligatory_triple_systems.pdf
          md=erdos593_obligatory_triple_systems.md
          log=erdos593_obligatory_triple_systems.log

          grep -Fq '\usepackage[numbers,sort&compress]{natbib}' "$tex"
          ! grep -Eq '\\address|\\email|École|Ecole|samuil\.petkov' "$tex" "$md"
          grep -Fq 'The author thanks Tom de Groot for his advice on how to revise the manuscript for greater clarity.' "$md"
          pdftotext "$pdf" - | grep -Fq '[1]'
          ! pdftotext "$pdf" - | grep -Eq 'École|Ecole|samuil\.petkov|Email address'
          test "$(pdfinfo "$pdf" | awk '/^Pages:/ {print $2}')" = 16
          pdfinfo "$pdf" | grep -Fq 'Page size:       595.276 x 841.89 pts (A4)'
          if grep -E 'LaTeX Warning|Package .* Warning|Overfull \\hbox|Underfull \\hbox|Overfull \\vbox|Underfull \\vbox|undefined references|Citation.*undefined' "$log"; then
            exit 1
          fi

          cat > build.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          BASE="erdos593_obligatory_triple_systems"
          BUILD_DIR="$(mktemp -d "${TMPDIR:-/tmp}/erdos593.XXXXXX")"
          trap 'rm -rf "$BUILD_DIR"' EXIT

          cp "$ROOT/$BASE.tex" "$BUILD_DIR/"
          cd "$BUILD_DIR"
          export TZ=UTC
          export SOURCE_DATE_EPOCH=1783771200
          export FORCE_SOURCE_DATE=1
          latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error "$BASE.tex"
          if grep -E 'LaTeX Warning|Package .* Warning|Overfull \\hbox|Underfull \\hbox|Overfull \\vbox|Underfull \\vbox|undefined references|Citation.*undefined' "$BASE.log"; then
            exit 1
          fi
          cp "$BASE.pdf" "$ROOT/$BASE.pdf"
          printf 'Built %s\n' "$ROOT/$BASE.pdf"
          SH
          chmod +x build.sh

          python3 - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace(
              'The typesetting is monochrome and Annals-inspired, using `amsart` with New TX text and mathematics. It is an original presentation and is not the official *Annals of Mathematics* class or submission template.',
              'The manuscript uses standard `amsart` theorem environments on A4 paper with one-inch margins, New TX text and mathematics, embedded PDF metadata, and a restrained monochrome presentation.'
          )
          text = text.replace(
              '`build.sh` — reproducible LuaLaTeX/Biber build.',
              '`build.sh` — reproducible pdfLaTeX/latexmk build.'
          )
          text = text.replace(
              'A TeX Live installation containing LuaLaTeX, Biber, `amsart`, `newtx`, `biblatex`, `microtype`, and the AMS packages is required.',
              'A TeX Live installation containing pdfLaTeX, `latexmk`, `amsart`, `newtx`, `natbib`, `microtype`, and the AMS packages is required.'
          )
          marker = '## Final synchronized manuscript\n'
          if marker not in text:
              text += '''\n\n## Final synchronized manuscript\n\nThe principal LaTeX, PDF, and Markdown files are synchronized with the rewritten arXiv manuscript. Citations are numeric and the bibliography is numbered. The visible author affiliation and email are intentionally omitted. The acknowledgment reads: “The author thanks Tom de Groot for his advice on how to revise the manuscript for greater clarity.”\n'''
          readme.write_text(text, encoding='utf-8')

          notes = Path('REVISION_NOTES.md')
          text = notes.read_text(encoding='utf-8')
          marker = '## Synchronized publication manuscript (20 July 2026)\n'
          if marker not in text:
              text += '''\n\n## Synchronized publication manuscript (20 July 2026)\n\n- Replaced the principal LaTeX, PDF, and Markdown manuscript with the final rewritten proof.\n- Standardized the paper as `amsart` on A4 paper with one-inch margins and standard theorem environments.\n- Converted all in-text citations and bibliography labels to numeric form.\n- Removed the visible affiliation and institutional email from the manuscript.\n- Rephrased the acknowledgment to thank Tom de Groot for advice on how to revise the manuscript for greater clarity.\n- Rebuilt the PDF with embedded fonts, populated metadata, no unresolved references, and no box warnings.\n'''
          notes.write_text(text, encoding='utf-8')
          PY

          rm -f .github/workflows/sync-rewritten-manuscript.yml
          rm -f erdos593_obligatory_triple_systems.aux \
                erdos593_obligatory_triple_systems.log \
                erdos593_obligatory_triple_systems.out \
                erdos593_obligatory_triple_systems.fls \
                erdos593_obligatory_triple_systems.fdb_latexmk

          checksum_tmp="$(mktemp)"
          while IFS= read -r file; do
            [ "$file" = 'SHA256SUMS' ] && continue
            sha256sum "$file"
          done < MANIFEST.txt > "$checksum_tmp"
          mv "$checksum_tmp" SHA256SUMS

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize rewritten Problem 593 manuscript'
          git push origin "HEAD:${GITHUB_REF_NAME}"
