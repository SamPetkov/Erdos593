name: Fix synchronization wording check

on:
  push:
    branches: [agent/finite-parameter-spectrum]
    paths:
      - 'scripts/fix_sync_required_wording.py'
      - '.github/workflows/fix-sync-required-wording.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finite-parameter-spectrum
          fetch-depth: 0
      - run: python scripts/fix_sync_required_wording.py
      - run: |
          rm scripts/fix_sync_required_wording.py
          rm .github/workflows/fix-sync-required-wording.yml
      - run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix manuscript synchronization wording gate'
          git push origin HEAD:agent/finite-parameter-spectrum
