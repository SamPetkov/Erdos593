name: Resynchronize spectrum artifacts after correction

on:
  push:
    branches: [agent/finite-parameter-spectrum]
    paths:
      - '.github/workflows/resync-spectrum-after-correction.yml'

permissions:
  contents: write

jobs:
  resynchronize:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finite-parameter-spectrum
          fetch-depth: 0
      - name: Install manuscript toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            latexmk \
            pandoc \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-science \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            poppler-utils
      - name: Remove one-shot workflow before inventory generation
        run: rm .github/workflows/resync-spectrum-after-correction.yml
      - name: Regenerate all manuscript artifacts
        run: python -u scripts/sync_manuscript_artifacts.py
      - name: Verify corrected proof text and mirrors
        run: |
          set -euo pipefail
          grep -Fq '$(a-1)(b-1)\ge0$' erdos593_obligatory_triple_systems.tex
          ! grep -Fq '$(\sqrt a-1)(\sqrt b-1)\ge0$' erdos593_obligatory_triple_systems.tex
          cmp -s erdos593_obligatory_triple_systems.tex arxiv/main.tex
          cmp -s erdos593_obligatory_triple_systems.tex Erdos593_revised.tex
          cmp -s erdos593_obligatory_triple_systems.md arxiv/main.md
          cmp -s erdos593_obligatory_triple_systems.pdf arxiv/main.pdf
          pdfinfo erdos593_obligatory_triple_systems.pdf | grep -Fq 'Pages:           18'
      - name: Commit synchronized clean branch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize corrected finite parameter manuscript'
          git push origin HEAD:agent/finite-parameter-spectrum
