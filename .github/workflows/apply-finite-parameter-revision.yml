name: Apply finite parameter manuscript revision

on:
  push:
    branches: [agent/finite-parameter-spectrum]
    paths:
      - 'scripts/apply_finite_parameter_revision.py'
      - 'scripts/finite_parameter_section.tex'
      - '.github/workflows/apply-finite-parameter-revision.yml'

permissions:
  contents: write

jobs:
  apply-revision:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finite-parameter-spectrum
          fetch-depth: 0
      - name: Apply manuscript and synchronization revisions
        run: python scripts/apply_finite_parameter_revision.py
      - name: Remove one-shot bootstrap files
        run: |
          rm scripts/apply_finite_parameter_revision.py
          rm scripts/finite_parameter_section.tex
          rm .github/workflows/apply-finite-parameter-revision.yml
      - name: Commit revision
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add finite parameter spectrum and streamline attribution'
          git push origin HEAD:agent/finite-parameter-spectrum
