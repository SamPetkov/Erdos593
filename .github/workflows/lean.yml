name: Lean focused checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formalization
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean and fetch Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formalization
          auto-config: false
          use-mathlib-cache: true
      - name: Targeted wrapper builds
        run: |
          lake build Erdos593.Graph.FiniteEdgeFactor
          lake build Erdos593.Graph.ShiftGraph
          lake build Erdos593.TripleSystem.EmbeddingLinearity
          lake build Erdos593.TripleSystem.NonlinearObstruction
          lake build Erdos593.TripleSystem.TriangleHostLinearity
          lake build Erdos593.TripleSystem.TriangleHostRamsey
          lake build Erdos593.TripleSystem.TriangleHostRamseyChromatic
          lake build Erdos593.TripleSystem.TriangleHostRamseyTransport
          lake build Erdos593.TripleSystem.CardinalPairPartition
          lake build Erdos593.TripleSystem.ErdosRado.PairTransport
          lake build Erdos593.TripleSystem.ErdosRadoCarrier
          lake build Erdos593.TripleSystem.ErdosRado.CanonicalTrace
          lake build Erdos593.TripleSystem.ErdosRado.TransfiniteIteration
          lake build Erdos593.TripleSystem.ErdosRado.TraceExtension
          lake build Erdos593.TripleSystem.ErdosRado.TraceLimit
          lake build Erdos593.TripleSystem.ErdosRado.TraceGraph
          lake build Erdos593.TripleSystem.ErdosRado.SourceRecursion
          lake build Erdos593.TripleSystem.ErdosRado.SourceCanonical
          lake build Erdos593.TripleSystem.ErdosRado.SourceRunInvariant
          lake build Erdos593.TripleSystem.ErdosRado.SourceCoherence
          lake build Erdos593.TripleSystem.ErdosRado.SourceTerminal
          lake build Erdos593.TripleSystem.ErdosRado.SourceEndhomogeneous
          lake build Erdos593.TripleSystem.ErdosRado.SourceSystem
          lake build Erdos593.TripleSystem.ErdosRado.CanonicalTree
          lake build Erdos593.TripleSystem.ErdosRado.CanonicalLevelCode
          lake build Erdos593.TripleSystem.ErdosRado.ErdosRadoCardinalArithmetic
          lake build Erdos593.TripleSystem.ErdosRado.EndhomogeneousLift
          lake build Erdos593.TripleSystem.ErdosRado.Theorem
          lake build Erdos593.TripleSystem.TriangleHostRamseyUnconditional
          lake build Erdos593.TripleSystem.CompleteBipartiteAtomObligatory
          lake build Erdos593.TripleSystem.ConstructiblePositiveObligatory
          lake build Erdos593.TripleSystem.SequenceLiftTrace
          lake build Erdos593.TripleSystem.SequenceLiftBaseNode
          lake build Erdos593.TripleSystem.SequenceLiftBaseNormalForm
          lake build Erdos593.TripleSystem.SequenceLiftBaseLetter
          lake build Erdos593.TripleSystem.SequenceLiftFiniteTrace
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiber
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberIndex
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberPartition
          lake build Erdos593.TripleSystem.SequenceLiftBaseApex
          lake build Erdos593.TripleSystem.SequenceLiftBaseIncidence
          lake build Erdos593.TripleSystem.SequenceLiftBaseLetterSubgraph
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberFactor
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberExpansion
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberConstructible
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberObligatory
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberAssembly
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIndex
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceGraph
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportBranchGeometry
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceAcyclic
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceAcyclicEndpoints
          lake build Erdos593.TripleSystem.FiniteLiftGeneratedBridge
          lake build Erdos593.TripleSystem.SequenceLiftEmbeddedSourceEndpoints
          lake build Erdos593.TripleSystem.SequenceLiftEmbeddedSourceIntrinsic
          lake build Erdos593.TripleSystem.SequenceLiftEmbeddedSourceBridge
          lake build Erdos593.TripleSystem.SequenceLiftMissingBridgeObstruction
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceForestOrder
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceForestOrderBridge
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceForestOrderEndpoints
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberGlobalSpine
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberCardinality
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberTraceSum
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberEquiv
          lake build Erdos593.TripleSystem.SequenceLiftTaggedBaseLetterEquiv
          lake build Erdos593.TripleSystem.SequenceLiftTaggedBaseLetterSourceEquiv
          lake build Erdos593.TripleSystem.SequenceLiftBaseApexEquiv
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberIndexApexEquiv
          lake build Erdos593.TripleSystem.SequenceLiftTaggedBaseApexEquiv
          lake build Erdos593.TripleSystem.SequenceLiftTaggedBaseApexSourceEquiv
      - name: Strict wrapper source checks
        run: |
          lake env lean -DwarningAsError=true Erdos593/Graph/FiniteEdgeFactor.lean
          lake env lean -DwarningAsError=true Erdos593/Graph/ShiftGraph.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/EmbeddingLinearity.lean
