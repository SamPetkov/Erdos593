          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIncidenceAcyclic.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIncidenceAcyclicEndpoints.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/FiniteLiftGeneratedBridge.lean
