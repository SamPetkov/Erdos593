          lake env lean -DwarningAsError=true Erdos593/TripleSystem/TriangleHostLinearity.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/TriangleHostRamsey.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/TriangleHostRamseyChromatic.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/TriangleHostRamseyTransport.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/CardinalPairPartition.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/PairTransport.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRadoCarrier.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/CanonicalTrace.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/TransfiniteIteration.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/TraceExtension.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/TraceLimit.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/TraceGraph.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/SourceRecursion.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/SourceCanonical.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/SourceRunInvariant.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/SourceCoherence.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/SourceTerminal.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/SourceEndhomogeneous.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/SourceSystem.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ErdosRado/CanonicalTree.lean
