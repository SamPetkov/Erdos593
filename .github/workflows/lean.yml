          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseApexEquiv.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberIndexApexEquiv.lean
