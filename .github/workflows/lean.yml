name: Lean focused checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formalization
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean and fetch Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formalization
          auto-config: false
          use-mathlib-cache: true
      - name: Targeted wrapper builds
        run: |
          lake build Erdos593.TripleSystem.CompleteBipartiteAtomObligatory
          lake build Erdos593.TripleSystem.ConstructiblePositiveObligatory
          lake build Erdos593.TripleSystem.SequenceLiftTrace
          lake build Erdos593.TripleSystem.SequenceLiftBaseNode
          lake build Erdos593.TripleSystem.SequenceLiftBaseNormalForm
          lake build Erdos593.TripleSystem.SequenceLiftBaseLetter
          lake build Erdos593.TripleSystem.SequenceLiftFiniteTrace
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiber
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberIndex
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberPartition
          lake build Erdos593.TripleSystem.SequenceLiftBaseApex
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIndex
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberCardinality
      - name: Strict wrapper source checks
        run: |
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/CompleteBipartiteAtomObligatory.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ConstructiblePositiveObligatory.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftTrace.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseNode.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseNormalForm.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseLetter.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftFiniteTrace.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiber.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberIndex.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberPartition.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseApex.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIndex.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberCardinality.lean
