name: Lean focused checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formalization
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean and fetch Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formalization
          auto-config: false
          use-mathlib-cache: true
      - name: Targeted wrapper builds
        run: |
          lake build Erdos593.Graph.FiniteEdgeFactor
          lake build Erdos593.TripleSystem.EmbeddingLinearity
          lake build Erdos593.TripleSystem.NonlinearObstruction
          lake build Erdos593.TripleSystem.CompleteBipartiteAtomObligatory
          lake build Erdos593.TripleSystem.ConstructiblePositiveObligatory
          lake build Erdos593.TripleSystem.SequenceLiftTrace
          lake build Erdos593.TripleSystem.SequenceLiftBaseNode
          lake build Erdos593.TripleSystem.SequenceLiftBaseNormalForm
          lake build Erdos593.TripleSystem.SequenceLiftBaseLetter
          lake build Erdos593.TripleSystem.SequenceLiftFiniteTrace
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiber
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberIndex
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberPartition
          lake build Erdos593.TripleSystem.SequenceLiftBaseApex
          lake build Erdos593.TripleSystem.SequenceLiftBaseIncidence
          lake build Erdos593.TripleSystem.SequenceLiftBaseLetterSubgraph
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberFactor
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberExpansion
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberConstructible
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberObligatory
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberAssembly
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIndex
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceGraph
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportBranchGeometry
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceAcyclic
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceAcyclicEndpoints
          lake build Erdos593.TripleSystem.FiniteLiftGeneratedBridge
          lake build Erdos593.TripleSystem.SequenceLiftEmbeddedSourceEndpoints
          lake build Erdos593.TripleSystem.SequenceLiftEmbeddedSourceIntrinsic
          lake build Erdos593.TripleSystem.SequenceLiftEmbeddedSourceBridge
          lake build Erdos593.TripleSystem.SequenceLiftMissingBridgeObstruction
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceForestOrder
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceForestOrderBridge
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberSupportIncidenceForestOrderEndpoints
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberGlobalSpine
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberCardinality
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberTraceSum
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberEquiv
          lake build Erdos593.TripleSystem.SequenceLiftTaggedBaseLetterEquiv
          lake build Erdos593.TripleSystem.SequenceLiftTaggedBaseLetterSourceEquiv
          lake build Erdos593.TripleSystem.SequenceLiftBaseApexEquiv
          lake build Erdos593.TripleSystem.SequenceLiftBaseFiberIndexApexEquiv
          lake build Erdos593.TripleSystem.SequenceLiftTaggedBaseApexEquiv
          lake build Erdos593.TripleSystem.SequenceLiftTaggedBaseApexSourceEquiv
      - name: Strict wrapper source checks
        run: |
          lake env lean -DwarningAsError=true Erdos593/Graph/FiniteEdgeFactor.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/EmbeddingLinearity.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/NonlinearObstruction.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/CompleteBipartiteAtomObligatory.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/ConstructiblePositiveObligatory.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftTrace.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseNode.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseNormalForm.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseLetter.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftFiniteTrace.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiber.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberIndex.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberPartition.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseApex.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseIncidence.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseLetterSubgraph.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberFactor.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberExpansion.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberConstructible.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberObligatory.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberAssembly.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIndex.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIncidenceGraph.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportBranchGeometry.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIncidenceAcyclic.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIncidenceAcyclicEndpoints.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/FiniteLiftGeneratedBridge.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftEmbeddedSourceEndpoints.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftEmbeddedSourceIntrinsic.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftEmbeddedSourceBridge.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftMissingBridgeObstruction.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIncidenceForestOrder.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIncidenceForestOrderBridge.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberSupportIncidenceForestOrderEndpoints.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberGlobalSpine.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberCardinality.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberTraceSum.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberEquiv.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftTaggedBaseLetterEquiv.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftTaggedBaseLetterSourceEquiv.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseApexEquiv.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftBaseFiberIndexApexEquiv.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftTaggedBaseApexEquiv.lean
          lake env lean -DwarningAsError=true Erdos593/TripleSystem/SequenceLiftTaggedBaseApexSourceEquiv.lean
      - name: Generated self-contained consistency
        run: |
          python scripts/generate_self_contained.py --check
