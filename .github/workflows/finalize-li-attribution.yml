name: Finalize Problem 593 attribution revision

on:
  push:
    branches:
      - agent/update-self-contained-build-status

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out revision branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/update-self-contained-build-status

      - name: Apply verified manuscript patch
        run: |
          set -euo pipefail
          cat .sync_manuscript_patch/part-* > /tmp/erdos593-attribution.patch
          echo '2f411e41f9817c09dee02de812463d86207da4afdefe182e148082711fa46831  /tmp/erdos593-attribution.patch' | sha256sum -c --strict
          git apply --check /tmp/erdos593-attribution.patch
          git apply /tmp/erdos593-attribution.patch

      - name: Compile revised manuscript
        uses: xu-cheng/latex-action@v3
        env:
          TZ: UTC
          SOURCE_DATE_EPOCH: 1784548800
          FORCE_SOURCE_DATE: 1
        with:
          root_file: erdos593_obligatory_triple_systems.tex
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Verify and commit materialized revision
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils

          base=erdos593_obligatory_triple_systems
          tex="$base.tex"
          md="$base.md"
          pdf="$base.pdf"
          log="$base.log"

          grep -Fq '\documentclass[a4paper,11pt,reqno]{amsart}' "$tex"
          grep -Fq '\usepackage[numbers,sort&compress]{natbib}' "$tex"
          grep -Fq "first publicly posted complete proof" "$tex"
          grep -Fq "Relation to Li's proof" "$tex"
          grep -Fq "Eric Li for a productive discussion" "$tex"
          grep -Fq 'AI assistance and provenance' "$tex"
          grep -Fq 'formalization/PROVENANCE.md' README.md
          grep -Fq 'complete machine-checked finite' formalization/SELF_CONTAINED_BUILD.md
          ! grep -Eq 'Independent work|does not use that manuscript' "$tex" "$md" README.md SOURCE_LEDGER.md
          ! grep -Eq '\\address|\\email|École|Ecole|samuil\.petkov' "$tex" "$md"

          test "$(pdfinfo "$pdf" | awk '/^Pages:/ {print $2}')" = 15
          pdfinfo "$pdf" | grep -Fq 'A4'
          pdftotext "$pdf" - | grep -Fq 'first publicly posted complete proof'
          pdftotext "$pdf" - | grep -Fq 'Eric Li for a productive discussion'
          pdftotext "$pdf" - | grep -Fq '[3] Eric Li'
          ! pdftotext "$pdf" - | grep -Eq 'École|Ecole|samuil\.petkov|Email address'
          awk 'NR > 2 && $4 != "yes" {exit 1}' < <(pdffonts "$pdf")

          if grep -E 'LaTeX Warning|Package .* Warning|Overfull \\hbox|Underfull \\hbox|Overfull \\vbox|Underfull \\vbox|undefined references|Citation.*undefined|Rerun to get' "$log"; then
            exit 1
          fi

          rm -rf .sync_manuscript_patch
          rm -f .github/workflows/finalize-li-attribution.yml
          rm -f "$base".{aux,log,out,toc,fls,fdb_latexmk}

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git ls-files | sort > MANIFEST.txt
          git add MANIFEST.txt
          while IFS= read -r file; do
            if [ "$file" != SHA256SUMS ]; then
              sha256sum "$file"
            fi
          done < MANIFEST.txt > SHA256SUMS
          git add SHA256SUMS
          git commit -m 'Revise Problem 593 attribution and formalisation framing'
          git push origin HEAD:agent/update-self-contained-build-status
