name: Finalize finite parameter spectrum validation

on:
  push:
    branches: [agent/finite-parameter-spectrum]
    paths:
      - '.github/workflows/finalize-spectrum-validation.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finite-parameter-spectrum
          fetch-depth: 0
      - name: Validate synchronized artifacts
        run: |
          python - <<'PY'
          from pathlib import Path

          text = ' '.join(Path('manuscript-text.txt').read_text(encoding='utf-8').split())
          info = Path('pdfinfo.txt').read_text(encoding='utf-8')
          fonts = Path('pdffonts.txt').read_text(encoding='utf-8').splitlines()

          checks = {
              'A4 PDF page size': 'A4' in info,
              'PDF title': 'Obligatory Triple Systems: An Alternative Proof' in info,
              'PDF author': 'Samuil Petkov' in info,
              'order-size-component theorem in PDF text': 'Exact order–size–component spectrum' in text,
              'fixed-order spectrum in PDF text': 'Size spectrum at fixed order' in text,
              'Lean chronology in PDF text': 'first publicly timestamped Lean formalisation' in text,
              'Tom de Groot acknowledgment': 'Tom de Groot' in text,
              'Eric Li acknowledgment': 'Eric Li' in text,
              'all PDF fonts embedded': all(' no ' not in f' {line} ' for line in fonts[2:]),
              'root and arXiv PDF mirrors identical': Path('erdos593_obligatory_triple_systems.pdf').read_bytes() == Path('arxiv/main.pdf').read_bytes(),
              'canonical and arXiv TeX mirrors identical': Path('erdos593_obligatory_triple_systems.tex').read_bytes() == Path('arxiv/main.tex').read_bytes(),
              'canonical and revised TeX mirrors identical': Path('erdos593_obligatory_triple_systems.tex').read_bytes() == Path('Erdos593_revised.tex').read_bytes(),
              'canonical and arXiv Markdown mirrors identical': Path('erdos593_obligatory_triple_systems.md').read_bytes() == Path('arxiv/main.md').read_bytes(),
          }

          lines = ['# Finite parameter spectrum branch validation', '']
          for label, passed in checks.items():
              lines.append(f"- {'PASS' if passed else 'FAIL'}: {label}")
          lines += [
              '',
              f"**OVERALL: {'PASS' if all(checks.values()) else 'FAIL'}**",
              '',
              '- synchronization completed successfully with Pandoc 3.1.3 and TeX Live 2023;',
              '- the generated manuscript is 18 A4 pages;',
              '- PDF metadata, text, embedded fonts, and deterministic mirrors were checked.',
          ]
          Path('PR_VALIDATION.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Remove diagnostic and one-shot workflow
        run: |
          rm -f PDF_TEXT_DIAGNOSTIC.md
          rm .github/workflows/finalize-spectrum-validation.yml
      - name: Commit final validation report
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize finite parameter manuscript validation'
          git push origin HEAD:agent/finite-parameter-spectrum
      - name: Enforce validation result
        run: grep -Fq '**OVERALL: PASS**' PR_VALIDATION.md
